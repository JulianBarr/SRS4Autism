<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CUMA 具身和弦键盘 v11 (防弹版)</title>
    <style>
        :root {
            --bg: #121212;
            --text: #ffffff;
            --left-color: rgba(52, 199, 89, 0.15);
            --left-border: rgba(52, 199, 89, 0.4);
            --right-color: rgba(0, 122, 255, 0.15);
            --right-border: rgba(0, 122, 255, 0.4);
            --thumb-color: rgba(255, 204, 0, 0.15);
            --thumb-border: rgba(255, 204, 0, 0.5);
            --active-bg: rgba(255, 255, 255, 0.9);
            --active-text: #000;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text);
            font-family: -apple-system, sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            overscroll-behavior: none; touch-action: none; user-select: none;
        }

        #top-bar { padding: 15px 20px; display: flex; justify-content: flex-end; z-index: 100;}
        #btn-clear {
            background: #333; color: #fff; border: none; padding: 8px 16px; 
            border-radius: 20px; font-size: 1rem; cursor: pointer;
        }

        #display-area {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 0 5%;
        }

        #realtime-display {
            font-size: 1.2rem; color: #4ade80; margin-bottom: 20px; 
            font-family: monospace; height: 1.5rem;
            background: rgba(0,0,0,0.5); padding: 5px 20px; border-radius: 20px;
        }

        #pinyin-buffer { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
            margin-bottom: 15px; min-height: 40px; z-index: 10;
        }
        
        .syllable-pill {
            display: inline-flex; align-items: center;
            background: rgba(255,255,255,0.1); border: 1px solid #555;
            padding: 6px 12px; border-radius: 8px; font-size: 1.5rem;
        }

        .syllable-delete {
            margin-left: 10px; font-size: 1.2rem; color: #ff453a;
            background: none; border: none; padding: 0 5px;
            line-height: 1; pointer-events: none; 
        }

        #hanzi-buffer { 
            font-size: 3.5rem; font-weight: bold; color: #fff; 
            min-height: 5rem; text-align: center; word-wrap: break-word;
            text-shadow: 0 0 20px rgba(255,255,255,0.2); transition: opacity 0.2s;
        }
        .loading { opacity: 0.5; }

        /* ====== 键盘布局 ====== */
        #keyboard-area {
            position: relative; height: 45vh; display: flex; justify-content: center;
            border-top: 1px solid #333; 
            padding-top: 20px; 
            margin-bottom: 15vh; /* 抬高整体 */
        }

        .main-fingers {
            display: flex; gap: 260px; justify-content: center; align-items: flex-start; z-index: 2;
        }

        .hand-section { display: flex; gap: 30px; height: 100%; }
        .finger-col { display: flex; flex-direction: column; gap: 12px; width: 75px; }

        .key {
            height: 65px; border-radius: 12px; position: relative;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            font-size: 1.6rem; font-weight: bold; transition: background-color 0.05s, transform 0.05s;
            border: 2px solid; color: rgba(255,255,255,0.8);
        }

        .key.active {
            background-color: var(--active-bg) !important; color: var(--active-text) !important;
            transform: scale(0.92); border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        .left-hand .key { background: var(--left-color); border-color: var(--left-border); }
        .right-hand .key { background: var(--right-color); border-color: var(--right-border); }
        
        .col-l2, .col-r2 { margin-top: 0px; }       
        .col-l1, .col-r1 { margin-top: 30px; }      
        .col-l3, .col-r3 { margin-top: 50px; }      
        .col-l4 { margin-top: 90px; }               

        /* 巨型大拇指自由区 */
        .thumb-zone {
            position: absolute; 
            bottom: -10vh; 
            width: 100%; 
            display: flex; justify-content: center; gap: 90px;
            padding-left: 12vw; /* 强行右移，释放左侧空间 */
            z-index: 10; pointer-events: none; 
        }

        .thumb-agent {
            pointer-events: auto; 
            width: 180px; height: 100px;
            background: var(--thumb-color); border: 2px solid var(--thumb-border);
            border-radius: 40px; display: flex; justify-content: center; align-items: center; flex-direction: column;
            font-size: 2.2rem; font-weight: bold; color: rgba(255,255,255,0.8);
        }
        
        .thumb-agent.active {
            background-color: var(--active-bg); color: var(--active-text);
            transform: scale(0.98); border-color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .key[data-hint-left]::before {
            content: attr(data-hint-left);
            position: absolute; left: -24px; top: 50%; transform: translateY(-50%);
            color: #666; font-size: 1.2rem; font-weight: normal; pointer-events: none; z-index: -1;
        }

        .sub-label { font-size: 13px; font-weight: normal; margin-top: 5px; opacity: 0.7; display: block;}
        .hidden { visibility: hidden; } 
    </style>
</head>
<body>

    <div id="top-bar">
        <button id="btn-clear" onclick="clearBuffers()">清空 (Clear)</button>
    </div>

    <div id="display-area">
        <div id="realtime-display">准备就绪</div>
        <div id="pinyin-buffer"></div>
        <div id="hanzi-buffer">等待输入流</div>
    </div>

    <div id="keyboard-area">
        
        <div class="thumb-zone">
            <div class="thumb-agent key" data-type="thumbs" data-val="i">i / y <span class="sub-label">左大拇指</span></div>
            <div class="thumb-agent key" data-type="thumbs" data-val="u">u / w <span class="sub-label">右大拇指</span></div>
        </div>

        <div class="main-fingers">
            <div class="hand-section left-hand">
                <div class="finger-col col-l4" id="L4">
                    <div class="key" data-type="initials" data-val="ch">ch</div>
                    <div class="key" data-type="initials" data-val="zh">zh</div>
                    <div class="key" data-type="initials" data-val="sh">sh</div>
                </div>
                <div class="finger-col col-l3" id="L3">
                    <div class="key" data-type="initials" data-val="k" data-hint-left="c">k</div>
                    <div class="key" data-type="initials" data-val="g" data-hint-left="z">g</div>
                    <div class="key" data-type="initials" data-val="h" data-hint-left="s">h</div>
                </div>
                <div class="finger-col col-l2" id="L2">
                    <div class="key" data-type="initials" data-val="t" data-hint-left="q">t</div>
                    <div class="key" data-type="initials" data-val="d" data-hint-left="j">d</div>
                    <div class="key" data-type="initials" data-val="n" data-hint-left="x">n</div>
                </div>
                <div class="finger-col col-l1" id="L1">
                    <div class="key" data-type="initials" data-val="p" data-hint-left="r">p</div>
                    <div class="key" data-type="initials" data-val="b" data-hint-left="f">b</div>
                    <div class="key" data-type="initials" data-val="m" data-hint-left="l">m</div>
                </div>
            </div>

            <div class="hand-section right-hand">
                <div class="finger-col col-r1" id="R1">
                    <div class="key" data-type="r1" data-val="e">e</div>
                    <div class="key" data-type="r1" data-val="a">a</div>
                    <div class="key" data-type="r1" data-val="o">o</div>
                </div>
                <div class="finger-col col-r2" id="R2">
                    <div class="key" data-type="r2" data-val="n">n<span class="sub-label">鼻</span></div>
                    <div class="key" data-type="r2" data-val="ng">ng<span class="sub-label">鼻</span></div>
                </div>
                <div class="finger-col col-r3" id="R3">
                    <div class="key" data-type="r3" data-val="i">i<span class="sub-label">尾</span></div>
                    <div class="key" data-type="r3" data-val="u">u/o<span class="sub-label">尾</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const realtimeEl = document.getElementById('realtime-display');
        const pinyinBufferEl = document.getElementById('pinyin-buffer');
        const hanziBufferEl = document.getElementById('hanzi-buffer');
        
        let pinyinStream = []; 
        let streamIdCounter = 0;
        
        let settleTimer = null;
        const CHORD_WINDOW = 120; // 滚键容错时间窗
        
        // 核心数据池
        let strokeData = { initials: new Set(), thumbs: new Set(), r1: new Set(), r2: new Set(), r3: new Set() };

        const jointInitials = { "p,t": "r", "b,d": "f", "m,n": "l", "k,t": "q", "d,g": "j", "h,n": "x", "ch,k": "c", "g,zh": "z", "h,sh": "s" };
        
        // 极简正字法字典
        const zeroInitialMap = { 
            'i': 'yi', 'ia': 'ya', 'ie': 'ye', 'iao': 'yao', 'iu': 'you', 'ian': 'yan', 'in': 'yin', 'iang': 'yang', 'ing': 'ying', 'iong': 'yong', 'ii':'yi',
            'u': 'wu', 'ua': 'wa', 'uo': 'wo', 'uu': 'wo', 'uou':'wo', 'uai': 'wai', 'ui': 'wei', 'uan': 'wan', 'un': 'wen', 'uang': 'wang', 'ung': 'weng', 'ong': 'weng', 
            'ü': 'yu', 'üe': 'yue', 'üan': 'yuan', 'ün': 'yun' 
        };

        function clearBuffers() {
            pinyinStream = [];
            renderBuffers();
            hanziBufferEl.innerText = "等待输入流";
        }

        function handleTouch(e) {
            for (let i = 0; i < e.touches.length; i++) {
                let elem = document.elementFromPoint(e.touches[i].clientX, e.touches[i].clientY);
                let pill = elem ? elem.closest('.syllable-pill') : null;
                if (pill) {
                    let id = parseInt(pill.getAttribute('data-id'));
                    if (!isNaN(id)) {
                        pinyinStream = pinyinStream.filter(item => item.id !== id);
                        renderBuffers();
                        mockPredictFromLLM();
                    }
                    return; 
                }
            }

            e.preventDefault(); 
            
            if (settleTimer) {
                clearTimeout(settleTimer);
                settleTimer = null;
            }

            document.querySelectorAll('.key, .thumb-agent').forEach(el => el.classList.remove('active'));

            for (let i = 0; i < e.touches.length; i++) {
                let elem = document.elementFromPoint(e.touches[i].clientX, e.touches[i].clientY);
                if (elem && (elem.classList.contains('key') || elem.classList.contains('thumb-agent')) && !elem.classList.contains('hidden')) {
                    elem.classList.add('active');
                    let type = elem.getAttribute('data-type');
                    let val = elem.getAttribute('data-val');
                    
                    // 防弹容错层：兼容可能的 HTML 拼写错误，绝对不报错
                    if (type) {
                        if (type === 'initial') type = 'initials';
                        if (type === 'thumb') type = 'thumbs';
                        if (strokeData[type]) {
                            strokeData[type].add(val);
                        }
                    }
                }
            }
            updateRealtimeDisplay();

            let hasInput = (strokeData.initials.size > 0 || strokeData.thumbs.size > 0 || strokeData.r1.size > 0 || strokeData.r2.size > 0 || strokeData.r3.size > 0);
            
            if (e.touches.length === 0 && hasInput) {
                settleTimer = setTimeout(() => {
                    processChord();
                    strokeData = { initials: new Set(), thumbs: new Set(), r1: new Set(), r2: new Set(), r3: new Set() };
                    updateRealtimeDisplay();
                }, CHORD_WINDOW);
            }
        }

        function updateRealtimeDisplay() {
            let iArr = Array.from(strokeData.initials).sort();
            let initial = iArr.length > 1 ? (jointInitials[iArr.join(',')] || iArr.join('')) : (iArr[0] || '');
            
            let medial = "";
            if (strokeData.thumbs.has('i') && strokeData.thumbs.has('u')) medial = "ü";
            else if (strokeData.thumbs.has('i')) medial = "i";
            else if (strokeData.thumbs.has('u')) medial = "u";

            let fRaw = medial + Array.from(strokeData.r1).join('') + Array.from(strokeData.r2).join('') + Array.from(strokeData.r3).join('');

            if(!initial && !fRaw) { realtimeEl.innerText = "等待敲击..."; return; }
            realtimeEl.innerText = `[ ${initial} ] + [ ${fRaw} ]`;
        }

        function processChord() {
            let iArr = Array.from(strokeData.initials).sort();
            let initial = iArr.length > 1 ? (jointInitials[iArr.join(',')] || iArr.join('')) : (iArr[0] || '');
            
            // 快捷撤销
            if (iArr.includes('p') && strokeData.thumbs.has('i') && strokeData.r1.size === 0) {
                pinyinStream.pop();
                renderBuffers();
                mockPredictFromLLM();
                return;
            }

            let medial = "";
            if (strokeData.thumbs.has('i') && strokeData.thumbs.has('u')) medial = "ü";
            else if (strokeData.thumbs.has('i')) medial = "i";
            else if (strokeData.thumbs.has('u')) medial = "u";

            let r1 = Array.from(strokeData.r1).join('');
            let r2 = Array.from(strokeData.r2).join('');
            let r3 = Array.from(strokeData.r3).join('');
            
            // 物理发音组合纠偏
            let fRaw = medial + r1 + r2 + r3;
            fRaw = fRaw.replace('au', 'ao').replace('eu', 'ou').replace('uu', 'uo'); 
            
            let finalResult = fRaw;

            // 拼音正字法分离处理
            if (initial) {
                finalResult = fRaw.replace('ung', 'ong'); 
            } else {
                finalResult = zeroInitialMap[fRaw] || fRaw;
            }

            let finalPinyin = `${initial}${finalResult}`;
            
            if (finalPinyin) {
                pinyinStream.push({ id: streamIdCounter++, text: finalPinyin });
                renderBuffers();
                mockPredictFromLLM();
            }
        }

        function renderBuffers() {
            pinyinBufferEl.innerHTML = pinyinStream.map(item => 
                `<div class="syllable-pill" data-id="${item.id}">
                    ${item.text} <button class="syllable-delete">×</button>
                </div>`
            ).join('');
        }

        function mockPredictFromLLM() {
            if (pinyinStream.length === 0) {
                hanziBufferEl.innerText = "等待输入流";
                return;
            }
            hanziBufferEl.classList.add('loading');
            let requestStr = pinyinStream.map(i => i.text).join(' ').toLowerCase();

            setTimeout(() => {
                hanziBufferEl.classList.remove('loading');
                let mockResult = "";
                
                if (requestStr.includes("wo")) mockResult += "我 ";
                if (requestStr.includes("yao")) mockResult += "要 ";
                if (requestStr.includes("ping")) mockResult += "苹 ";
                if (requestStr.includes("guo")) mockResult += "果 ";
                
                hanziBufferEl.innerText = mockResult.trim() || requestStr; 
            }, 300);
        }

        document.addEventListener('touchstart', handleTouch, {passive: false});
        document.addEventListener('touchmove', handleTouch, {passive: false});
        document.addEventListener('touchend', handleTouch, {passive: false});
        document.addEventListener('touchcancel', handleTouch, {passive: false});
    </script>
</body>
</html>
